<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welzijnsevaluatie</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --accent-green: #00c853;
            --light-mint: #f0f7f1;
            --white: #ffffff;
            --text-dark: #1b3022;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light-mint);
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .app-wrapper { width: 100%; max-width: 480px; }

        /* Header Styling */
        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .coach-pill {
            background: var(--white);
            padding: 10px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #d1e4d4;
        }

        .coach-pill select {
            border: none;
            font-weight: bold;
            color: var(--primary-green);
            font-size: 14px;
            outline: none;
            background: transparent;
        }

        /* Card Styling */
        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.08);
            border: 1px solid #e8f0e9;
        }

        .card-title {
            display: block;
            font-weight: 800;
            font-size: 17px;
            margin-bottom: 15px;
            color: var(--primary-green);
        }

        /* Options & Inputs */
        .option-item {
            display: flex;
            align-items: center;
            padding: 14px;
            background: #f9fbf9;
            border: 2px solid #edf2ee;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-item:active { transform: scale(0.98); }

        .option-item input {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            accent-color: var(--accent-green);
        }

        .option-item.active {
            border-color: var(--accent-green);
            background-color: #f0fff4;
        }

        .text-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d1e4d4;
            font-size: 16px;
            box-sizing: border-box;
            background: #fff;
            margin-top: 8px;
        }

        /* Slider */
        .slider-wrap { text-align: center; padding: 10px 0; }
        .slider-val { font-size: 36px; font-weight: 800; color: var(--accent-green); }
        .range-input {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #e0eee2;
            outline: none;
            accent-color: var(--primary-green);
            margin: 15px 0;
        }

        /* Special Sections */
        .breakfast-toggle {
            background: #fff9e6;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid #ffeeba;
            display: none;
        }

        .will-box {
            background: var(--primary-green);
            color: white !important;
        }
        .will-box .card-title { color: white; }
        .will-box .option-item { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .will-box .option-item input { accent-color: #fff; }

        /* Submit Button */
        .btn-submit {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            font-size: 18px;
            font-weight: 800;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3);
            cursor: pointer;
            margin: 20px 0;
        }

        #status-msg {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h1>🌿 Welzijnscheck</h1>
        <div class="coach-pill">
            Coach: 
            <select id="coach">
                <option value="Andreas">Andreas</option>
                <option value="Thalyssa">Thalyssa</option>
            </select>
        </div>
    </div>

    <form id="wellnessForm">
        <div class="card">
            <span class="card-title">1. Hoe voel jij je meestal?</span>
            <label class="option-item"><input type="radio" name="q1" value="Kalm" required> Kalm</label>
            <label class="option-item"><input type="radio" name="q1" value="Actief"> Actief</label>
            <label class="option-item"><input type="radio" name="q1" value="Gestresseerd"> Gestresseerd</label>
        </div>

        <div class="card">
            <span class="card-title">2. Gezondheid & Energie (1-10)</span>
            <div class="slider-wrap">
                <div class="slider-val">5</div>
                <input type="range" id="q2" min="1" max="10" value="5" class="range-input" oninput="this.previousElementSibling.innerText = this.value">
                <div style="display:flex; justify-content:space-between; font-size:11px; opacity:0.6;">
                    <span>Helemaal niet ok</span>
                    <span>Supergoed</span>
                </div>
            </div>
        </div>

        <div class="card">
            <span class="card-title">3. Jouw eetgewoontes</span>
            <label class="option-item"><input type="checkbox" name="q3" value="Meestal gezond"> Ik eet meestal gezond</label>
            <label class="option-item"><input type="checkbox" name="q3" value="Slaat maaltijden over" id="triggerBreakfast"> Ik sla vaak maaltijden over</label>
            
            <div id="breakfastSection" class="breakfast-toggle">
                <p style="margin-top:0; font-weight:bold; font-size:14px;">Ontbijt je iedere dag?</p>
                <label style="margin-right:15px;"><input type="radio" name="ontbijt" value="Ja"> Ja</label>
                <label><input type="radio" name="ontbijt" value="Nee"> Nee</label>
            </div>

            <label class="option-item"><input type="checkbox" name="q3" value="Onregelmatig"> Ik eet onregelmatig</label>
            <label class="option-item"><input type="checkbox" name="q3" value="Snoep/Energy"> Ik ben fan van snoep/energydrinks</label>
            <label class="option-item"><input type="checkbox" name="q3" value="Ongezond"> Ik eet meestal ongezond</label>
        </div>

        <div class="card">
            <span class="card-title">4. Hoeveel beweeg je per dag?</span>
            <label class="option-item"><input type="radio" name="q4" value="Minder dan 30 min" required> Minder dan 30 min</label>
            <label class="option-item"><input type="radio" name="q4" value="Meer dan 30 min"> Meer dan 30 min</label>
            <label class="option-item"><input type="radio" name="q4" value="Sportief"> Sportief</label>
        </div>

        <div class="card">
            <span class="card-title">5. Wat is voor jou het belangrijkste?</span>
            <label class="option-item"><input type="checkbox" name="q5" value="Energie & Focus"> Meer energie & focus</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Afslanken/Spiermassa"> Afslanken zonder honger (of spiermassa opbouwen)</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Conditie & Sport"> Betere conditie & sportprestaties</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Huid/Haar/Gewrichten"> Mooie huid/haar & soepele gewrichten</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Weerstand/Slaap"> Sterke weerstand, goede spijsvertering & slaap</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Anders" id="triggerAnders"> Anders:</label>
            <input type="text" id="andersText" class="text-input" placeholder="Typ hier de details..." style="display:none;">
        </div>

        <div class="card will-box">
            <span class="card-title">✨ Wil je graag...</span>
            <label class="option-item"><input type="checkbox" name="extra" value="Fitcheck"> Een gratis fitcheck?</label>
            <label class="option-item"><input type="checkbox" name="extra" value="Infosessie"> Een uitnodiging voor een infosessie?</label>
        </div>

        <div class="card">
            <span class="card-title">👤 Contactgegevens</span>
            <input type="text" id="naam" placeholder="Voornaam en naam" required class="text-input">
            <input type="tel" id="tel" placeholder="Telefoonnummer" class="text-input">
            <input type="email" id="email" placeholder="E-mailadres" class="text-input">
        </div>

        <div id="status-msg"></div>
        <button type="submit" id="submitBtn" class="btn-submit">OPSLAAN & VOLGENDE</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzTvEBSWlUqnDXe8WU5j2-hQsnBUFns9zFEEkvSWlzS5bOOosT4wN3Vaot9fvMNtFziiA/exec';
    const form = document.getElementById('wellnessForm');
    
    // Interactieve logica
    document.getElementById('triggerBreakfast').addEventListener('change', function() {
        document.getElementById('breakfastSection').style.display = this.checked ? 'block' : 'none';
    });

    document.getElementById('triggerAnders').addEventListener('change', function() {
        document.getElementById('andersText').style.display = this.checked ? 'block' : 'none';
    });

    // Versturen
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status-msg');
        
        btn.disabled = true;
        status.style.display = 'block';
        status.innerText = "Bezig met opslaan... ⏳";
        status.style.background = "#fff";

        const q3 = Array.from(document.querySelectorAll('input[name="q3"]:checked')).map(c => c.value);
        if(document.getElementById('triggerBreakfast').checked) {
            const ontbijt = document.querySelector('input[name="ontbijt"]:checked');
            if(ontbijt) q3.push("Ontbijt elke dag: " + ontbijt.value);
        }

        const q5 = Array.from(document.querySelectorAll('input[name="q5"]:checked')).map(c => c.value);
        if(document.getElementById('triggerAnders').checked) {
            q5.push("Anders: " + document.getElementById('andersText').value);
        }

        const extras = Array.from(document.querySelectorAll('input[name="extra"]:checked')).map(c => c.value);

        const formData = new FormData();
        formData.append('coach', document.getElementById('coach').value);
        formData.append('naam', document.getElementById('naam').value);
        formData.append('telefoon', document.getElementById('tel').value);
        formData.append('email', document.getElementById('email').value);
        formData.append('q1', document.querySelector('input[name="q1"]:checked').value);
        formData.append('q2', document.getElementById('q2').value);
        formData.append('q3', q3.join(' | '));
        formData.append('q4', document.querySelector('input[name="q4"]:checked').value);
        formData.append('q5', q5.join(' | '));
        formData.append('fitcheck', extras.includes("Fitcheck") ? "JA" : "Nee");
        formData.append('infosessie', extras.includes("Infosessie") ? "JA" : "Nee");

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                status.innerText = "✅ Succesvol opgeslagen!";
                status.style.background = "#d4edda";
                form.reset();
                document.querySelector('.slider-val').innerText = "5";
                setTimeout(() => { 
                    status.style.display = 'none'; 
                    btn.disabled = false;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }, 3000);
            })
            .catch(error => {
                status.innerText = "❌ Fout. Check internet.";
                status.style.background = "#f8d7da";
                btn.disabled = false;
            });
    });
</script>
</body>
</html>
