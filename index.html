<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welzijnsevaluatie - Andreas & Thalyssa</title>
    <style>
        :root { --primary-color: #1e5a32; --bg-color: #f0f4f1; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: #333; }
        .container { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        h1 { color: var(--primary-color); font-size: 20px; text-align: center; margin-top: 0; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        
        .coach-box { background: #e8f5e9; padding: 15px; border-radius: 8px; border: 2px solid var(--primary-color); margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: var(--primary-color); }
        
        select, input[type="text"], input[type="email"], input[type="tel"] { 
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; 
        }

        .option-card { 
            display: flex; align-items: center; background: #f9f9f9; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer;
        }
        .option-card input { margin-right: 12px; transform: scale(1.4); }

        .slider-container { text-align: center; padding: 10px 0; }
        .slider { width: 100%; height: 15px; border-radius: 5px; background: #d3d3d3; outline: none; transition: opacity .2s; }

        .submit-btn { 
            background: var(--primary-color); color: white; border: none; padding: 18px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; 
        }
        .submit-btn:disabled { background: #ccc; }

        #status { margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; display: block !important; }
        .error { background: #f8d7da; color: #721c24; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="coach-box">
        <label for="coach">Welzijnscoach:</label>
        <select id="coach">
            <option value="Andreas">Andreas</option>
            <option value="Thalyssa">Thalyssa</option>
        </select>
    </div>

    <h1>5 VRAGEN OVER STRESS EN WELZIJN</h1>

    <form id="surveyForm">
        <label>1. Hoe voel jij je meestal?</label>
        <select id="q1" required>
            <option value="" disabled selected>Maak een keuze...</option>
            <option value="Kalm">Kalm</option>
            <option value="Actief">Actief</option>
            <option value="Gestresseerd">Gestresseerd</option>
        </select>

        <label>2. Hoe gaat het met je gezondheid & energie? (1-10)</label>
        <div class="slider-container">
            <input type="range" id="q2" min="1" max="10" value="5" class="slider" oninput="this.nextElementSibling.value = this.value">
            <output style="font-size: 24px; font-weight: bold; color: var(--primary-color);">5</output>
        </div>

        <label>3. Hoe zou je jouw eetgewoontes omschrijven?</label>
        <div id="q3_group">
            <label class="option-card"><input type="checkbox" name="q3" value="Meestal gezond"> Meestal gezond</label>
            <label class="option-card"><input type="checkbox" name="q3" value="Slaat maaltijden over"> Ik sla vaak maaltijden over</label>
            <label class="option-card"><input type="checkbox" name="q3" value="Onregelmatig"> Ik eet onregelmatig</label>
            <label class="option-card"><input type="checkbox" name="q3" value="Snoep/Energydrinks"> Ik ben fan van snoep/energydrinks</label>
            <label class="option-card"><input type="checkbox" name="q3" value="Ongezond"> Ik eet meestal ongezond</label>
        </div>

        <label>4. Hoeveel beweeg je per dag?</label>
        <div id="q4_group">
            <label class="option-card"><input type="radio" name="q4" value="Minder dan 30 min" required> Minder dan 30 min</label>
            <label class="option-card"><input type="radio" name="q4" value="Meer dan 30 min"> Meer dan 30 min</label>
            <label class="option-card"><input type="radio" name="q4" value="Sportief"> Sportief</label>
        </div>

        <label>5. Wat is voor jou het belangrijkste?</label>
        <div id="q5_group">
            <label class="option-card"><input type="checkbox" name="q5" value="Energie & Focus"> Meer energie & focus</label>
            <label class="option-card"><input type="checkbox" name="q5" value="Afslanken"> Afslanken zonder honger</label>
            <label class="option-card"><input type="checkbox" name="q5" value="Conditie"> Betere conditie & sport</label>
            <label class="option-card"><input type="checkbox" name="q5" value="Huid/Haar"> Mooie huid/haar & gewrichten</label>
            <label class="option-card"><input type="checkbox" name="q5" value="Weerstand"> Sterke weerstand & slaap</label>
        </div>

        <label>Naam en Voornaam:</label>
        <input type="text" id="naam" required placeholder="Typ hier de naam...">

        <label>Telefoonnummer:</label>
        <input type="tel" id="tel" placeholder="0470 00 00 00">

        <label>E-mailadres:</label>
        <input type="email" id="email" placeholder="naam@voorbeeld.be">

        <div id="status"></div>
        <button type="submit" class="submit-btn" id="submitBtn">Opslaan in Spreadsheet</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzTvEBSWlUqnDXe8WU5j2-hQsnBUFns9zFEEkvSWlzS5bOOosT4wN3Vaot9fvMNtFziiA/exec';
    const form = document.getElementById('surveyForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        status.innerText = "Bezig met verzenden...";
        status.className = "";
        status.style.display = "block";

        const q3Values = Array.from(document.querySelectorAll('input[name="q3"]:checked')).map(cb => cb.value).join(', ');
        const q4Value = document.querySelector('input[name="q4"]:checked').value;
        const q5Values = Array.from(document.querySelectorAll('input[name="q5"]:checked')).map(cb => cb.value).join(', ');

        const formData = new FormData();
        formData.append('coach', document.getElementById('coach').value);
        formData.append('q1', document.getElementById('q1').value);
        formData.append('q2', document.getElementById('q2').value);
        formData.append('q3', q3Values);
        formData.append('q4', q4Value);
        formData.append('q5', q5Values);
        formData.append('naam', document.getElementById('naam').value);
        formData.append('telefoon', document.getElementById('tel').value);
        formData.append('email', document.getElementById('email').value);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                status.innerText = "Succes! Gegevens staan in de Sheet.";
                status.className = "success";
                form.reset();
                btn.disabled = false;
                document.querySelector('output').innerText = "5";
                setTimeout(() => { status.style.display = "none"; }, 5000);
            })
            .catch(error => {
                status.innerText = "Fout bij verzenden. Probeer opnieuw.";
                status.className = "error";
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
