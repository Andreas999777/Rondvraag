<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welzijnsevaluatie - Andreas & Thalyssa</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-light: #e8f5e9;
            --accent-color: #00c853;
            --text-main: #212121;
            --bg-body: #f5f5f5;
            --bg-card: #ffffff;
            --border-color: #e0e0e0;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg-body); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; }
        
        .coach-selector { background: var(--bg-card); padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border-color); }
        .coach-selector label { display: block; font-weight: 600; color: var(--primary-color); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }
        .coach-selector select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); font-size: 16px; }

        .question-card { background: var(--bg-card); padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .question-label { display: block; font-size: 17px; font-weight: 700; color: var(--text-main); margin-bottom: 15px; }
        .section-divider { border-top: 2px solid var(--primary-color); margin: 30px 0 20px 0; padding-top: 10px; color: var(--primary-color); font-weight: 800; text-align: center; }

        .choice-group { display: flex; flex-direction: column; gap: 10px; }
        .choice-option { display: flex; align-items: center; padding: 15px; background: #fff; border: 2px solid var(--border-color); border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .choice-option input { margin-right: 12px; transform: scale(1.3); }
        .choice-option:has(input:checked) { background-color: var(--primary-light); border-color: var(--primary-color); }

        .modern-slider { width: 100%; height: 8px; border-radius: 4px; background: var(--border-color); outline: none; margin: 15px 0; accent-color: var(--accent-color); }
        .slider-value { font-size: 32px; font-weight: 800; color: var(--primary-color); text-align: center; }

        .modern-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); font-size: 16px; box-sizing: border-box; margin-top: 10px; }
        
        .submit-btn { background: var(--primary-color); color: white; border: none; padding: 18px; width: 100%; font-size: 18px; font-weight: 700; border-radius: 15px; cursor: pointer; margin-top: 20px; }
        #status-message { margin-top: 15px; padding: 15px; border-radius: 12px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="coach-selector">
        <label>Welzijnscoach</label>
        <select id="coach">
            <option value="Andreas">Andreas</option>
            <option value="Thalyssa">Thalyssa</option>
        </select>
    </div>

    <form id="surveyForm">
        <div class="question-card">
            <label class="question-label">1. Hoe voel jij je meestal?</label>
            <div class="choice-group">
                <label class="choice-option"><input type="radio" name="q1" value="Kalm" required> Kalm</label>
                <label class="choice-option"><input type="radio" name="q1" value="Actief"> Actief</label>
                <label class="choice-option"><input type="radio" name="q1" value="Gestresseerd"> Gestresseerd</label>
            </div>
        </div>

        <div class="question-card">
            <label class="question-label">2. Gezondheid & Energie (1-10)</label>
            <input type="range" id="q2" min="1" max="10" value="5" class="modern-slider" oninput="this.nextElementSibling.innerText = this.value">
            <div class="slider-value">5</div>
        </div>

        <div class="question-card">
            <label class="question-label">3. Eetgewoontes</label>
            <div class="choice-group">
                <label class="choice-option"><input type="checkbox" name="q3" value="Meestal gezond"> Meestal gezond</label>
                <label class="choice-option"><input type="checkbox" name="q3" value="Slaat maaltijden over"> Sla maaltijden over</label>
                <label class="choice-option"><input type="checkbox" name="q3" value="Onregelmatig"> Onregelmatig</label>
                <label class="choice-option"><input type="checkbox" name="q3" value="Snoep/Energydrinks"> Snoep/Energydrinks</label>
                <label class="choice-option"><input type="checkbox" name="q3" value="Ongezond"> Meestal ongezond</label>
            </div>
        </div>

        <div class="question-card">
            <label class="question-label">4. Hoeveel beweeg je per dag?</label>
            <div class="choice-group">
                <label class="choice-option"><input type="radio" name="q4" value="Minder dan 30 min" required> Minder dan 30 min</label>
                <label class="choice-option"><input type="radio" name="q4" value="Meer dan 30 min"> Meer dan 30 min</label>
                <label class="choice-option"><input type="radio" name="q4" value="Sportief"> Sportief</label>
            </div>
        </div>

        <div class="question-card">
            <label class="question-label">5. Wat is voor jou het belangrijkste?</label>
            <div class="choice-group">
                <label class="choice-option"><input type="checkbox" name="q5" value="Energie"> Energie & Focus</label>
                <label class="choice-option"><input type="checkbox" name="q5" value="Afslanken"> Afslanken</label>
                <label class="choice-option"><input type="checkbox" name="q5" value="Conditie"> Conditie & Sport</label>
                <label class="choice-option"><input type="checkbox" name="q5" value="Huid/Haar"> Huid/Haar/Gewrichten</label>
                <label class="choice-option"><input type="checkbox" name="q5" value="Weerstand"> Weerstand & Slaap</label>
            </div>
        </div>

        <div class="section-divider">WIL JE GRAAG...</div>
        
        <div class="question-card" style="border: 2px solid var(--accent-color);">
            <div class="choice-group">
                <label class="choice-option">
                    <input type="checkbox" id="fitcheck" value="JA">
                    <span style="font-weight: bold;">Een gratis fitcheck (welzijnsevaluatie)?</span>
                </label>
                <label class="choice-option">
                    <input type="checkbox" id="infosessie" value="JA">
                    <span style="font-weight: bold;">Een uitnodiging voor een infosessie over voeding & levensstijl?</span>
                </label>
            </div>
        </div>

        <div class="question-card">
            <label class="question-label">Contactgegevens</label>
            <input type="text" id="naam" required class="modern-input" placeholder="Voornaam en naam">
            <input type="tel" id="tel" class="modern-input" placeholder="Telefoonnummer">
            <input type="email" id="email" class="modern-input" placeholder="E-mailadres">
        </div>

        <div id="status-message"></div>
        <button type="submit" class="submit-btn" id="submitBtn">Opslaan & Volgende</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzTvEBSWlUqnDXe8WU5j2-hQsnBUFns9zFEEkvSWlzS5bOOosT4wN3Vaot9fvMNtFziiA/exec';
    const form = document.getElementById('surveyForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status-message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        status.style.display = "block";
        status.innerText = "Bezig met verzenden...";
        status.style.backgroundColor = "#e0e0e0";

        const formData = new FormData();
        formData.append('coach', document.getElementById('coach').value);
        formData.append('q1', document.querySelector('input[name="q1"]:checked').value);
        formData.append('q2', document.getElementById('q2').value);
        formData.append('q3', Array.from(document.querySelectorAll('input[name="q3"]:checked')).map(cb => cb.value).join(', '));
        formData.append('q4', document.querySelector('input[name="q4"]:checked').value);
        formData.append('q5', Array.from(document.querySelectorAll('input[name="q5"]:checked')).map(cb => cb.value).join(', '));
        
        // De nieuwe velden
        formData.append('fitcheck', document.getElementById('fitcheck').checked ? "JA" : "Nee");
        formData.append('infosessie', document.getElementById('infosessie').checked ? "JA" : "Nee");
        
        formData.append('naam', document.getElementById('naam').value);
        formData.append('telefoon', document.getElementById('tel').value);
        formData.append('email', document.getElementById('email').value);

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                status.innerText = "Succesvol opgeslagen!";
                status.style.backgroundColor = "#d4edda";
                form.reset();
                document.querySelector('.slider-value').innerText = "5";
                setTimeout(() => { 
                    status.style.display = "none"; 
                    btn.disabled = false;
                    window.scrollTo(0,0);
                }, 3000);
            })
            .catch(error => {
                status.innerText = "Fout bij verzenden!";
                status.style.backgroundColor = "#f8d7da";
                btn.disabled = false;
            });
    });
</script>
</body>
</html>
