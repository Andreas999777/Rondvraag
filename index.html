<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buurtrondvraag</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --soft-green: rgba(46, 125, 50, 0.08); 
            --border-green: rgba(46, 125, 50, 0.15);
            --white: #ffffff;
            --text-dark: #1b3022;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f8f5;
            color: var(--text-dark);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .app-wrapper { width: 100%; max-width: 480px; }
        .header { text-align: center; padding: 15px 0; }
        .header h1 { margin: 0; font-size: 22px; color: var(--primary-green); letter-spacing: 1px; }

        .coach-pill {
            background: var(--white);
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid var(--border-green);
        }

        .coach-pill select { border: none; font-weight: bold; color: var(--primary-green); outline: none; background: transparent; font-size: 16px; }

        .card {
            background: var(--white);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid var(--border-green);
        }

        .glass-card {
            background: var(--soft-green) !important;
            border: 1px solid var(--border-green);
        }

        .card-title { display: block; font-weight: 800; font-size: 16px; margin-bottom: 12px; color: var(--primary-green); }

        .option-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--border-green);
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .option-item input { width: 18px; height: 18px; margin-right: 12px; accent-color: var(--primary-green); }

        .text-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border-green);
            font-size: 16px;
            box-sizing: border-box;
            margin-top: 5px;
        }

        .slider-wrap { text-align: center; }
        .slider-val { font-size: 32px; font-weight: 800; color: var(--primary-green); }
        .range-input { width: 100%; height: 8px; accent-color: var(--primary-green); margin: 10px 0; }

        .static-sub {
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            margin: 5px 0 15px 0;
            border: 1px dashed var(--border-green);
        }

        .btn-submit {
            background: rgba(46, 125, 50, 0.12);
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
            padding: 18px;
            width: 100%;
            font-size: 18px;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 30px;
        }

        .btn-submit:active { background: var(--primary-green); color: white; }
        #status-msg { text-align: center; padding: 12px; border-radius: 10px; display: none; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <h1>🌿 Welzijnscheck</h1>
        <div class="coach-pill">
            Coach: <select id="coach"><option value="Andreas">Andreas</option><option value="Thalyssa">Thalyssa</option></select>
        </div>
    </div>

    <form id="wellnessForm">
        <div class="card">
            <span class="card-title">1. Hoe voel jij je meestal?</span>
            <label class="option-item"><input type="radio" name="q1" value="Kalm" required> Kalm</label>
            <label class="option-item"><input type="radio" name="q1" value="Actief"> Actief</label>
            <label class="option-item"><input type="radio" name="q1" value="Gestresseerd"> Gestresseerd</label>
        </div>

        <div class="card">
            <span class="card-title">2. Gezondheid & Energie (1-10)</span>
            <div class="slider-wrap">
                <div class="slider-val">5</div>
                <input type="range" id="q2" min="1" max="10" value="5" class="range-input" oninput="this.previousElementSibling.innerText = this.value">
            </div>
        </div>

        <div class="card">
            <span class="card-title">3. Jouw eetgewoontes</span>
            <label class="option-item"><input type="checkbox" name="q3" value="Meestal gezond"> Ik eet meestal gezond</label>
            <label class="option-item"><input type="checkbox" name="q3" value="Meestal ongezond"> Ik eet meestal ongezond</label>
            <label class="option-item"><input type="checkbox" name="q3" value="Onregelmatig"> Ik eet onregelmatig</label>
            <label class="option-item"><input type="checkbox" name="q3" value="Slaat maaltijden over"> Ik sla vaak maaltijden over</label>
            
            <div class="static-sub">
                <span style="font-size: 14px; font-weight: bold; color: var(--primary-green);">Ontbijt je iedere dag?</span><br><br>
                <label style="margin-right:20px;"><input type="radio" name="ontbijt" value="Ja"> Ja</label>
                <label><input type="radio" name="ontbijt" value="Nee"> Nee</label>
            </div>

            <label class="option-item"><input type="checkbox" name="q3" value="Snoep/Energy"> Ik ben fan van snoep/energydrinks</label>
        </div>

        <div class="card">
            <span class="card-title">4. Hoeveel beweeg je per dag?</span>
            <label class="option-item"><input type="radio" name="q4" value="Minder dan 30 min" required> Minder dan 30 min</label>
            <label class="option-item"><input type="radio" name="q4" value="Meer dan 30 min"> Meer dan 30 min</label>
            <label class="option-item"><input type="radio" name="q4" value="Sportief"> Sportief</label>
        </div>

        <div class="card">
            <span class="card-title">5. Wat is voor jou het belangrijkste?</span>
            <label class="option-item"><input type="checkbox" name="q5" value="Energie"> Meer energie & focus</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Afslanken"> Afslanken zonder honger of spiermassa opbouwen</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Conditie"> Betere conditie & sportprestaties</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Huid/Haar"> Mooie huid/haar & soepele gewrichten</label>
            <label class="option-item"><input type="checkbox" name="q5" value="Weerstand"> Sterke weerstand, goede spijsvertering & slaap</label>
            <div class="static-sub">
                <span style="font-size: 14px; font-weight: bold; color: var(--primary-green);">Anders:</span>
                <input type="text" id="andersText" class="text-input" placeholder="Typ hier de details...">
            </div>
        </div>

        <div class="card glass-card">
            <span class="card-title">✨ Wil je graag...</span>
            <label class="option-item">
                <input type="checkbox" id="fitcheck_cb"> 
                <span>Wil een gratis welzijnsevaluatie?</span>
            </label>
            <label class="option-item">
                <input type="checkbox" id="infosessie_cb"> 
                <span>Een uitnodiging voor een infosessie?</span>
            </label>
        </div>

        <div class="card">
            <span class="card-title">👤 Contactgegevens</span>
            <input type="text" id="naam" placeholder="Voornaam en naam" required class="text-input">
            <input type="tel" id="tel" placeholder="Telefoonnummer" class="text-input">
            <input type="email" id="email" placeholder="E-mailadres" class="text-input">
        </div>

        <div id="status-msg"></div>
        <button type="submit" id="submitBtn" class="btn-submit">OPSLAAN</button>
    </form>
</div>

<script>
    // DE NIEUWE LINK IS HIER VERWERKT:
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz-CB4LDRdtV0kW5H3p31vSVIFAEcARNRvWzrwwe1toX94AB_laGFtxE8MjvOWNyoqb/exec';
    const form = document.getElementById('wellnessForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status-msg');
        btn.disabled = true;
        status.style.display = 'block';
        status.innerText = "Bezig met opslaan... ⏳";
        status.style.background = "#fff";

        // Vraag 3 verzamelen
        const q3 = Array.from(document.querySelectorAll('input[name="q3"]:checked')).map(c => c.value);
        const ontbijt = document.querySelector('input[name="ontbijt"]:checked');
        if(ontbijt) q3.push("Ontbijt: " + ontbijt.value);

        // Vraag 5 verzamelen
        const q5 = Array.from(document.querySelectorAll('input[name="q5"]:checked')).map(c => c.value);
        const anders = document.getElementById('andersText').value;
        if(anders) q5.push("Anders: " + anders);

        const formData = new FormData();
        formData.append('coach', document.getElementById('coach').value);
        formData.append('naam', document.getElementById('naam').value);
        formData.append('telefoon', document.getElementById('tel').value);
        formData.append('email', document.getElementById('email').value);
        formData.append('q1', document.querySelector('input[name="q1"]:checked').value);
        formData.append('q2', document.getElementById('q2').value);
        formData.append('q3', q3.join(' | '));
        formData.append('q4', document.querySelector('input[name="q4"]:checked').value);
        formData.append('q5', q5.join(' | '));
        
        // DEZE NAMEN MATCHEN NU MET HET SCRIPT IN DE NIEUWE SHEET:
        formData.append('fitcheck', document.getElementById('fitcheck_cb').checked ? "JA" : "Nee");
        formData.append('infosessie', document.getElementById('infosessie_cb').checked ? "JA" : "Nee");

        fetch(scriptURL, { method: 'POST', body: formData })
            .then(response => {
                status.innerText = "✅ Succesvol Opgeslagen!";
                status.style.background = "#d4edda";
                form.reset();
                document.querySelector('.slider-val').innerText = "5";
                setTimeout(() => { 
                    status.style.display = 'none'; 
                    btn.disabled = false;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }, 2000);
            })
            .catch(error => {
                status.innerText = "❌ Fout bij opslaan. Probeer opnieuw.";
                status.style.background = "#f8d7da";
                btn.disabled = false;
            });
    });
</script>
</body>
</html>
